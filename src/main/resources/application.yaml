spring:
  application:
    name: aisly-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aisly}
    username: ${DB_USER:aisly}
    password: ${DB_PASSWORD:aisly}
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

aisly:
  security:
    hmac-secret: ${AISLY_SECURITY_HMAC_SECRET}
    issuer: ${AISLY_SECURITY_ISSUER:Aisly AuthServer}
    internal-webhook-secret: ${AISLY_INTERNAL_WEBHOOK_SECRET}
