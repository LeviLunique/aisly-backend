spring:
  application:
    name: aisly-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aisly}
    username: ${DB_USER:aisly}
    password: ${DB_PASSWORD:aisly}
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_ISSUER_URI:http://localhost:8080}
          jwk-set-uri: ${AUTH_JWK_SET_URI:}
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: false

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

aisly:
  security:
    issuer-uri: ${AUTH_ISSUER_URI:http://localhost:8080}
    jwk-set-uri: ${AUTH_JWK_SET_URI:}
    expected-audience: ${AUTH_AUDIENCE:aisly-api}
    internal-webhook-secret: ${AISLY_INTERNAL_WEBHOOK_SECRET:change-me-local}
